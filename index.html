<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verificação de Segurança</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; }
    body { background: #0f172a; color: #f8fafc; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    
    .captcha-card {
      background: #1e293b;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
      width: 100%;
      max-width: 360px;
      border: 1px solid #334155;
      text-align: center;
    }

    .captcha-header { font-size: 1.1rem; font-weight: 600; margin-bottom: 16px; color: #38bdf8; }

    /* Spinner */
    .spinner-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px 0;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #334155;
      border-top: 4px solid #38bdf8;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 12px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .challenge-content {
      display: none;
    }

    .challenge-box {
      background: #0f172a;
      padding: 12px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      user-select: none;
    }

    /* Estilização do Canvas onde a imagem é desenhada */
    canvas {
      border-radius: 4px;
      background: #020617;
    }

    .refresh-btn {
      background: none;
      border: none;
      color: #94a3b8;
      cursor: pointer;
      font-size: 1.4rem;
      padding: 4px 8px;
      transition: color 0.2s;
    }
    .refresh-btn:hover { color: #f8fafc; }

    input[type="text"] {
      width: 100%;
      padding: 10px 12px;
      border-radius: 6px;
      border: 1px solid #475569;
      background: #0f172a;
      color: #fff;
      margin-bottom: 12px;
      outline: none;
    }
    input[type="text"]:focus { border-color: #38bdf8; }

    button.verify-btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      background: #2563eb;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button.verify-btn:hover { background: #1d4ed8; }

    .status-msg {
      margin-top: 12px;
      font-size: 0.9rem;
      min-height: 20px;
    }
    .success { color: #4ade80; }
    .error { color: #f87171; }
  </style>
</head>
<body>

  <div class="captcha-card">
    <div class="captcha-header">Verificação Humana</div>

    <div id="loader" class="spinner-container">
      <div class="spinner"></div>
      <span style="font-size: 0.85rem; color: #94a3b8;">Analisando ambiente...</span>
    </div>

    <div id="challengeArea" class="challenge-content">
      <div class="challenge-box">
        <!-- Elemento Canvas para renderizar a imagem -->
        <canvas id="captchaCanvas" width="220" height="50"></canvas>
        <button class="refresh-btn" onclick="generateCaptcha()" title="Gerar novo código">↻</button>
      </div>

      <input type="text" id="userInput" placeholder="Digite o código da imagem" autocomplete="off">
      <button class="verify-btn" onclick="verifyCaptcha()">Verificar</button>
    </div>

    <div id="status" class="status-msg"></div>
  </div>

  <script>
    // 1. Framebusting
    if (window.top !== window.self) {
      window.top.location = window.self.location;
    }

    const MIN_HUMAN_DELAY_MS = 3000;
    const pageLoadTime = Date.now();
    let currentCode = "";
    let isLockedDueToTiming = false;

    // 2. Parser da URL
    function extractTargetUrl() {
      const params = new URLSearchParams(window.location.search);
      const rawUrl = params.get("url");

      if (rawUrl) {
        return rawUrl.startsWith("http") ? rawUrl : "https://" + rawUrl;
      }
      return "https://google.com";
    }

    const targetUrl = extractTargetUrl();

    // 3. Monitoramento de digitação precoce
    const userInputElement = document.getElementById("userInput");
    
    window.addEventListener("keydown", function() {
      if (Date.now() - pageLoadTime < MIN_HUMAN_DELAY_MS) {
        isLockedDueToTiming = true;
      }
    });

    userInputElement.addEventListener("input", function() {
      if (Date.now() - pageLoadTime < MIN_HUMAN_DELAY_MS) {
        isLockedDueToTiming = true;
      }
    });

    // 4. Liberação do Spinner
    setTimeout(() => {
      document.getElementById("loader").style.display = "none";
      document.getElementById("challengeArea").style.display = "block";
      generateCaptcha();
    }, MIN_HUMAN_DELAY_MS);

    // 5. GERADOR DE IMAGEM CAPTCHA (Canvas)
    function generateCaptcha() {
      const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
      let code = "";
      for (let i = 0; i < 6; i++) {
        code += chars.charAt(Math.floor(Math.random() * chars.length));
      }
      currentCode = code;

      // Desenha o texto dentro do Canvas
      const canvas = document.getElementById("captchaCanvas");
      const ctx = canvas.getContext("2d");

      // Limpa o canvas
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Fundo escuro levemente estilizado
      ctx.fillStyle = "#0f172a";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Adiciona ruído (linhas aleatórias para cruzar o texto)
      for (let i = 0; i < 5; i++) {
        ctx.strokeStyle = i % 2 === 0 ? "#38bdf8" : "#f43f5e";
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(Math.random() * canvas.width, Math.random() * canvas.height);
        ctx.lineTo(Math.random() * canvas.width, Math.random() * canvas.height);
        ctx.stroke();
      }

      // Desenha o texto do código com distorções individuais
      ctx.font = "bold 24px monospace";
      ctx.fillStyle = "#f8fafc";
      
      for (let i = 0; i < code.length; i++) {
        const x = 20 + i * 30;
        const y = 33 + (Math.random() * 8 - 4); // Pequena variação de altura
        const angle = (Math.random() * 0.4) - 0.2; // Pequeno ângulo aleatório
        
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(angle);
        ctx.fillText(code[i], 0, 0);
        ctx.restore();
      }

      document.getElementById("userInput").value = "";
    }

    // 6. Validação
    function verifyCaptcha() {
      const status = document.getElementById("status");

      if (isLockedDueToTiming) {
        status.className = "status-msg error";
        status.innerText = "✕ Acesso bloqueado: comportamento automatizado detectado.";
        document.getElementById("userInput").disabled = true;
        return;
      }

      const input = document.getElementById("userInput").value.trim().toUpperCase();

      if (!input) {
        status.className = "status-msg error";
        status.innerText = "Por favor, digite o código.";
        return;
      }

      if (input === currentCode) {
        status.className = "status-msg success";
        status.innerText = "✓ Sucesso! Redirecionando...";
        
        setTimeout(() => {
          window.location.href = targetUrl;
        }, 1000);
      } else {
        status.className = "status-msg error";
        status.innerText = "✕ Código incorreto. Tente novamente.";
        generateCaptcha();
      }
    }
  </script>

</body>
</html>
